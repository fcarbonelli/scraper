name: Deploy to EC2

# Auto-deploy on every push to main, plus a manual trigger button in the
# Actions tab for re-deploys without a code change.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't run two deploys at once; queue them. The second push waits for the
# first to finish (cancel-in-progress: false) — we never want to interrupt a
# running pm2 reload mid-flight.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  typecheck:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Block production deploys on a failing unit suite (regression guard).
      - name: Unit tests
        run: npm test

  deploy:
    name: SSH + reload
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # 5min should be plenty; pm2 reload is normally <10s
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /home/ubuntu/scraper

            echo "==> Fetching latest from origin/main"
            git fetch --all --quiet
            git reset --hard origin/main

            echo "==> Installing dependencies"
            npm ci

            # Playwright ships its package code via npm, but the actual browser
            # binary lives in ~/.cache/ms-playwright/ and only lands when you
            # explicitly run `playwright install`. Without this step the
            # Maxi Carrefour auto-login throws "Executable doesn't exist at
            # /home/ubuntu/.cache/ms-playwright/...". Idempotent + fast (~1s
            # when up to date), so safe on every deploy.
            #
            # The HOST_PLATFORM_OVERRIDE works around Playwright not yet
            # supporting Ubuntu 26.04 (lands in 1.61). The 24.04 binaries
            # are dynamically linked and run fine on 26.04 with the t64
            # libs installed by setup-ec2.sh. The same override is set in
            # ecosystem.config.cjs so the worker finds the binary at
            # runtime — keep them in sync.
            # See: https://github.com/microsoft/playwright/issues/40117
            echo "==> Ensuring Playwright Chromium is installed"
            export PLAYWRIGHT_HOST_PLATFORM_OVERRIDE=ubuntu24.04-x64
            npx playwright install chromium

            echo "==> Building TypeScript"
            npm run build

            # Seed the supermarkets table from `scripts/setup-db.ts`.
            # Idempotent (upsert by id) so it's safe to run on every deploy —
            # this is what makes "just push code" work for new supermarkets.
            # Must run BEFORE pm2 reload so the worker picks up the new rows
            # when it re-reads the active-supermarkets list at startup.
            echo "==> Seeding supermarkets table"
            npm run db:setup

            echo "==> Reloading PM2 (zero-downtime)"
            # `pm2 reload` will start processes that aren't running yet,
            # so this works for both first deploy and subsequent ones.
            # Reloading also forces the worker to re-load the supermarkets
            # list from the DB, picking up anything `db:setup` just inserted.
            pm2 reload ecosystem.config.cjs --update-env
            pm2 save

            echo "==> Deploy complete"
            pm2 status

      - name: Notify Telegram on success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHAT_ID:-}" ]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          # Trim commit message to 200 chars to keep the alert readable
          MSG=$(echo "${{ github.event.head_commit.message }}" | head -n1 | cut -c1-200)
          TEXT=$(printf '<b>Deploy succeeded</b>\n<b>Commit:</b> %s\n<b>By:</b> %s\n<a href="%s/%s/commit/%s">View commit</a>' \
                  "$MSG" "${{ github.actor }}" \
                  "${{ github.server_url }}" "${{ github.repository }}" "${{ github.sha }}")
          curl -fsS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" \
            > /dev/null

      - name: Notify Telegram on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHAT_ID:-}" ]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          TEXT=$(printf '<b>DEPLOY FAILED</b>\n<b>Repo:</b> %s\n<b>By:</b> %s\n<b>Commit:</b> <code>%s</code>\n<a href="%s/%s/actions/runs/%s">View logs</a>' \
                  "${{ github.repository }}" "${{ github.actor }}" \
                  "${{ github.sha }}" \
                  "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}")
          curl -fsS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" \
            > /dev/null
